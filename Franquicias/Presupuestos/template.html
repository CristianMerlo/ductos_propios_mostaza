<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Presupuesto Profesional Mostaza">
    <title>{{REPORT_TITLE}}</title>
    <!-- Google Fonts: Montserrat & Roboto -->
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Roboto:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-color: #D32F2F;
            /* Rojo Mostaza */
            --secondary-color: #2c2c2c;
            --accent-color: #B71C1C;
            --text-color: #333;
            --light-text: #666;
            --bg-color: #f4f7f6;
            --white: #ffffff;
            --border-radius: 12px;
            --card-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            --header-gradient: linear-gradient(135deg, #D32F2F 0%, #B71C1C 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--white);
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }

        /* Header Redesign */
        header {
            background: var(--header-gradient);
            color: var(--white);
            padding: 40px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: rgba(0, 0, 0, 0.1);
        }

        .header-content h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .header-content .ref-date {
            font-size: 1.1rem;
            font-weight: 300;
            opacity: 0.9;
        }

        .header-logo {
            background-color: var(--white);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);

            display: {
                    {
                    LOGO_DISPLAY
                }
            }

            ;
        }

        .header-logo img {
            height: 65px;
            width: auto;
            display: block;
        }

        /* Main Content Structure */
        main {
            padding: 50px 60px;
        }

        .section-card {
            margin-bottom: 40px;
        }

        h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 8px;
        }

        /* Section I: Datos Generales */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            background: #fdfdfd;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--primary-color);
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 0.8rem;
            color: var(--light-text);
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .info-value {
            font-weight: 500;
            font-size: 1rem;
        }

        /* Section II: Alcance */
        .scope-content {
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .sucursales-list {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }

        .sucursal-item {
            background: #fff;
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid #eee;
            display: flex;
            align-items: center;
            font-weight: 500;
            transition: all 0.2s;
        }

        .sucursal-item:hover {
            border-color: var(--primary-color);
            background: #fdf2f2;
        }

        .sucursal-item span {
            margin-right: 10px;
        }

        /* Section III: Tabla de Inversión */
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        th {
            background: #f8f9fa;
            color: var(--secondary-color);
            text-align: left;
            padding: 15px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            border-bottom: 2px solid #eee;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .total-row {
            background-color: #fcebeb;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
        }

        .total-row td {
            color: var(--primary-color);
            font-size: 1.1rem;
            padding: 20px 15px;
        }

        /* Section IV: Consideraciones */
        .terms-grid {
            display: grid;
            gap: 15px;
        }

        .term-item {
            display: flex;
            align-items: flex-start;
            padding: 12px;
            background: #fff;
            border-radius: 6px;
        }

        .term-badge {
            background: var(--secondary-color);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 15px;
            margin-top: 4px;
            min-width: 60px;
            text-align: center;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 30px;
            color: #aaa;
            font-size: 0.85rem;
            border-top: 1px solid #eee;
            background: #fafafa;
        }

        /* Print Button */
        .print-btn-container {
            position: fixed;
            bottom: 40px;
            right: 40px;
            z-index: 1000;
        }

        .print-btn {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .print-btn:hover {
            background-color: var(--primary-color);
            transform: scale(1.05);
        }

        .print-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Print Styles */
        @media print {
            body {
                background: white;
                padding: 0;
            }

            .container {
                box-shadow: none;
                margin: 0;
                width: 100%;
                max-width: 100%;
                border-radius: 0;
            }

            header {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .print-btn-container {
                display: none;
            }

            .sucursal-item {
                border: 1px solid #ddd;
            }
        }
    </style>
</head>

<body>

    <div class="print-btn-container">
        <button onclick="window.print()" class="print-btn">
            <svg viewBox="0 0 24 24">
                <path
                    d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z" />
            </svg>
            Imprimir / Guardar PDF
        </button>
    </div>

    <div class="container">
        <header>
            <div class="header-content">
                <h1>{{REPORT_TITLE}}</h1>
                <div class="ref-date">{{REPORT_DATE}}</div>
            </div>
            <div class="header-logo">
                <img src="{{LOGO}}" alt="Logo">
            </div>
        </header>

        <main id="presupuesto-content">
            {{REPORT_CONTENT}}
        </main>

        <footer>
            <p>&copy; 2026 Mantenimiento Franquicias Mostaza - Documento Confidencial</p>
        </footer>
    </div>

</body>

</html>
