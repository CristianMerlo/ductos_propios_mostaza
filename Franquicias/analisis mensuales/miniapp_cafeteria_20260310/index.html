<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Cafetería - Análisis Mensual</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #ff6b6b;
            --secondary: #4ecdc4;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --accent: #f59e0b;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            background: linear-gradient(to right, #ff6b6b, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--secondary);
            margin: 10px 0;
        }

        .stat-label {
            font-size: 0.875rem;
            color: #94a3b8;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-container {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            height: 400px;
        }

        .data-table-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow-x: auto;
        }

        .search-box {
            width: 100%;
            padding: 12px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            margin-bottom: 20px;
            font-size: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            text-align: left;
            padding: 12px;
            color: #94a3b8;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .tag {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .tag-resuelto {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        .tag-cerrado {
            background: rgba(148, 163, 184, 0.2);
            color: #94a3b8;
        }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div>
                <h1>Análisis Mensual: Cafetería</h1>
                <p style="margin: 5px 0 0; color: #94a3b8; font-size: 0.875rem;">Reporte consolidado de Enero 2026</p>
            </div>
            <div id="date-now" style="font-size: 0.875rem; color: #64748b;"></div>
        </header>

        <div class="stats-grid" id="stats-container">
            <!-- Stats will be loaded here -->
        </div>

        <div class="charts-grid">
            <div class="chart-container">
                <h3 style="margin-top:0">Top 10 Incidencias</h3>
                <canvas id="incidenciasChart"></canvas>
            </div>
            <div class="chart-container">
                <h3 style="margin-top:0">Horas Técnicas por Sucursal (HS_Final)</h3>
                <canvas id="sucursalesChart"></canvas>
            </div>
        </div>

        <div class="data-table-container">
            <input type="text" id="searchInput" class="search-box"
                placeholder="Buscar por código, incidencia o sucursal...">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Incidencia</th>
                        <th>Sucursal</th>
                        <th>HS</th>
                        <th>USD</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        document.getElementById('date-now').textContent = new Date().toLocaleDateString('es-AR', { day: 'numeric', month: 'long', year: 'numeric' });

        console.log('Iniciando carga de datos...');
        fetch('data.json')
            .then(response => {
                if (!response.ok) throw new Error('No se pudo cargar data.json');
                return response.json();
            })
            .then(data => {
                console.log('Datos cargados:', data);
                if (!data.records || data.records.length === 0) {
                    document.body.innerHTML = '<div style="padding:50px; text-align:center;"><h1>⚠️ No hay datos disponibles para mostrar</h1><p>Verifica que data.json contenga registros.</p></div>';
                    return;
                }
                renderStats(data.summary);
                renderCharts(data);
                renderTable(data.records);

                document.getElementById('searchInput').addEventListener('input', (e) => {
                    const search = e.target.value.toLowerCase();
                    const filtered = data.records.filter(r =>
                        (r.Código && r.Código.toString().includes(search)) ||
                        (r.Incidencia && r.Incidencia.toLowerCase().includes(search)) ||
                        (r.Sucursal && r.Sucursal.toLowerCase().includes(search))
                    );
                    renderTable(filtered);
                });
            })
            .catch(err => {
                console.error('Error:', err);
                document.body.innerHTML = '<div style="padding:50px; text-align:center; color: #ff6b6b;"><h1>❌ Error al cargar el Dashboard</h1><p>' + err.message + '</p><p>Asegúrate de abrir este archivo desde un servidor local o servidor de VS Code (Live Server).</p></div>';
            });

        function renderStats(summary) {
            const container = document.getElementById('stats-container');
            container.innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">Casos Totales</div>
                    <div class="stat-value">${summary.total_cases}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Casos Cafetería</div>
                    <div class="stat-value" style="color: var(--primary)">${summary.cafeteria_cases}</div>
                    <div class="stat-label">(${summary.cafeteria_percent}%)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Horas Totales (HS)</div>
                    <div class="stat-value" style="color: #60a5fa">${summary.total_hs}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Inversión USD</div>
                    <div class="stat-value" style="color: #fbbf24">$${summary.total_usd.toLocaleString()}</div>
                </div>
            `;
        }

        function renderCharts(data) {
            // Incidencias Chart
            new Chart(document.getElementById('incidenciasChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(data.top_incidencias).map(l => l.substring(0, 20) + '...'),
                    datasets: [{
                        label: 'Frecuencia',
                        data: Object.values(data.top_incidencias),
                        backgroundColor: '#ff6b6b',
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // Sucursales Chart
            new Chart(document.getElementById('sucursalesChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(data.top_sucursales_hours),
                    datasets: [{
                        label: 'HS Totales',
                        data: Object.values(data.top_sucursales_hours),
                        backgroundColor: '#4ecdc4',
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function renderTable(records) {
            const body = document.getElementById('tableBody');
            body.innerHTML = records.map(r => `
                <tr>
                    <td>#${r.Código}</td>
                    <td style="font-size: 0.875rem">${r.Incidencia}</td>
                    <td>${r.Sucursal}</td>
                    <td>${r.HS_Final}</td>
                    <td>$${r.USD}</td>
                    <td><span class="tag tag-${r.Estado.toLowerCase()}">${r.Estado}</span></td>
                </tr>
            `).join('');
        }
    </script>
</body>

</html>
