<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{REPORT_TITLE}}</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Roboto:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-color: #D32F2F;
            --secondary-color: #2c2c2c;
            --accent-color: #B71C1C;
            --text-color: #333;
            --bg-color: #f4f7f6;
            --white: #ffffff;
            --border-radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--white);
            border-radius: var(--border-radius);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #D32F2F 0%, #B71C1C 100%);
            color: var(--white);
            padding: 40px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .header-content h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .header-date {
            font-size: 1.1rem;
            font-weight: 300;
            opacity: 0.9;
        }

        .header-logo {
            background: var(--white);
            padding: 12px;
            border-radius: 8px;

            display: {
                    {
                    LOGO_DISPLAY
                }
            }

            ;
        }

        .header-logo img {
            height: 60px;
            width: auto;
        }

        main {
            padding: 50px 60px;
        }

        h1,
        h2,
        h3 {
            font-family: 'Montserrat', sans-serif;
            color: var(--secondary-color);
            margin-top: 2rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.8rem;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 0.5rem;
        }

        h2 {
            font-size: 1.4rem;
            color: var(--primary-color);
            border-bottom: 1px solid #eee;
            padding-bottom: 0.3rem;
        }

        h3 {
            font-size: 1.1rem;
        }

        p {
            margin-bottom: 1.2rem;
            font-size: 1.05rem;
        }

        ul,
        ol {
            margin-bottom: 1.5rem;
            padding-left: 1.5rem;
        }

        li {
            margin-bottom: 0.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 2rem 0;
            font-size: 0.95rem;
        }

        th {
            background: #f8f9fa;
            color: var(--secondary-color);
            text-align: left;
            padding: 12px;
            border-bottom: 2px solid #eee;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }

        .card {
            background: #fdfdfd;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--primary-color);
            margin-bottom: 2rem;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #aaa;
            font-size: 0.85rem;
            border-top: 1px solid #eee;
            background: #fafafa;
        }

        .print-btn {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
        }

        .print-btn:hover {
            background: var(--primary-color);
            transform: scale(1.05);
        }

        @media print {
            .print-btn {
                display: none;
            }

            body {
                padding: 0;
            }

            .container {
                box-shadow: none;
                border-radius: 0;
            }
        }
    </style>
</head>

<body>
    <button class="print-btn" onclick="window.print()">Imprimir / Guardar PDF</button>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>{{REPORT_TITLE}}</h1>
                <div class="header-date">{{REPORT_DATE}}</div>
            </div>
            <div class="header-logo"><img src="{{LOGO}}" alt="Logo"></div>
        </header>
        <main>
            {{REPORT_CONTENT}}
        </main>
        <footer>
            <p>&copy; 2026 Mantenimiento Franquicias Mostaza - Informe Ejecutivo de Gestión</p>
        </footer>
    </div>
</body>

</html>
