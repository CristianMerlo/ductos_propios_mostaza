<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dashboard Centralizado de Franquicias Mostaza">
    <title>Dashboard Franquicias | Mostaza</title>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Roboto:wght@300;400;500&display=swap"
        rel="stylesheet">

    <!-- Core Styles -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

    <!-- Header Section -->
    <header class="main-header">
        <div class="header-container">
            <div class="brand">
                <h1>Dashboard <span>Mantenimiento Franquicias</span></h1>
                <p class="subtitle">Portal de Acceso Centralizado</p>
            </div>
            <div class="logo-box">
                <img src="img/logo.png" alt="Mostaza Logo" id="main-logo">
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="main-content" class="fade-in">
        <div class="container" id="app-container">
            <!-- Dynamic Content Loaded Here -->
            <div class="dashboard-grid">
                <!-- Module Cards are generated via JS or kept here as base -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="main-footer">
        <p>&copy; 2026 Mostaza - Mantenimiento</p>
    </footer>

    <!-- Scripts -->
    <script src="assets/js/modules-data.js"></script>
    <script src="assets/js/script.js"></script>
</body>

</html>
