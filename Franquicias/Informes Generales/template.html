<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{REPORT_TITLE}}</title>
    <style>
        :root {
            --primary: #D32F2F;
            --primary-dark: #B71C1C;
            --secondary: #2c2c2c;
            --text: #333333;
            --bg: #f8f9fa;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            background: var(--white);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 90vh;
        }

        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 6px solid rgba(0, 0, 0, 0.1);
        }

        .header-info h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: 800;
        }

        .header-info .date {
            font-size: 1.1rem;
            opacity: 0.9;
            font-weight: 400;
        }

        .logo-box {
            background: white;
            padding: 12px;
            border-radius: 12px;

            display: {
                    {
                    LOGO_DISPLAY
                }
            }

            ;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .logo-box img {
            height: 65px;
            width: auto;
            display: block;
        }

        main {
            padding: 60px;
            flex-grow: 1;
        }

        h3 {
            color: var(--secondary);
            font-size: 1.4rem;
            margin: 40px 0 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        h3:first-of-type {
            margin-top: 0;
        }

        p {
            margin-bottom: 20px;
            font-size: 1.05rem;
            text-align: justify;
        }

        ul {
            margin-bottom: 25px;
            padding-left: 20px;
        }

        li {
            margin-bottom: 12px;
            font-size: 1.05rem;
            position: relative;
            padding-left: 10px;
        }

        li::marker {
            color: var(--primary);
            font-weight: bold;
        }

        b,
        strong {
            color: #000;
            font-weight: 700;
        }

        .gallery-section {
            padding: 0 60px 60px;
            background: #fff;
        }

        .gallery-section h2 {
            font-size: 1.6rem;
            margin-bottom: 30px;
            color: var(--secondary);
            border-left: 6px solid var(--primary);
            padding-left: 15px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .img-card {
            border: 1px solid #eee;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
        }

        .img-card:hover {
            transform: translateY(-5px);
        }

        .img-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .img-caption {
            padding: 12px;
            text-align: center;
            background: #fcfcfc;
            font-size: 0.9rem;
            color: #666;
            font-weight: 500;
            border-top: 1px solid #eee;
        }

        .empty-gallery {
            text-align: center;
            padding: 40px;
            background: #f9f9f9;
            border-radius: 12px;
            color: #888;
            font-style: italic;
            border: 2px dashed #eee;
        }

        footer {
            background: var(--secondary);
            color: #aaa;
            text-align: center;
            padding: 30px;
            font-size: 0.95rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .print-btn {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: var(--secondary);
            color: white;
            border: none;
            padding: 18px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .print-btn:hover {
            background: var(--primary);
            transform: scale(1.05);
        }

        @media print {
            body {
                padding: 0;
                background: white;
            }

            .container {
                box-shadow: none;
                border-radius: 0;
                width: 100%;
                max-width: 100%;
            }

            .print-btn {
                display: none;
            }

            header {
                background-color: var(--primary) !important;
                color: white !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .logo-box {
                box-shadow: none !important;
                background-color: white !important;
            }

            .img-card {
                break-inside: avoid;
            }
        }
    </style>
</head>

<body>
    <button class="print-btn" onclick="window.print()">
        <span>🖨️</span> Imprimir / Guardar PDF
    </button>

    <div class="container">
        <header>
            <div class="header-info">
                <h1>{{REPORT_TITLE}}</h1>
                <div class="date">{{REPORT_DATE}}</div>
            </div>
            <div class="logo-box">
                <img src="{{LOGO}}" alt="Logo">
            </div>
        </header>

        <main>
            {{REPORT_CONTENT}}
        </main>

        <section class="gallery-section" style="display: {{GALLERY_DISPLAY}};">
            <h2>Registro Fotográfico</h2>
            <div class="gallery-grid">
                {{IMAGE_GALLERY}}
            </div>
        </section>

        <footer>
            <p>Mantenimiento Franquicias Mostaza</p>
            <p style="font-size: 0.8rem; margin-top: 5px; opacity: 0.7;">Documento confidencial oficial de redacción técnica.</p>
        </footer>
    </div>
</body>

</html>
